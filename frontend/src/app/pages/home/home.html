<!-- Page d'accueil : titre + description + bouton Commencer -->
<!-- Le fichier .html décrit la structure visuelle du composant. -->
<!-- Les classes CSS sont définies dans home.scss -->

<main class="home-page">

  <!-- Zone centrale contenant tout le contenu -->
  <div class="home-card">

    <!-- Logo / icône décorative représentant le laboratoire -->
    <div class="home-logo" aria-hidden="true">🧪</div>

    <!-- Titre principal de la page -->
    <h1 class="home-title">Bienvenue dans le jeu<br><span class="home-brand">We Lab !</span></h1>

    <!-- Courte description du jeu pour expliquer au joueur ce qui l'attend -->
    <p class="home-description">
      Teste tes connaissances en cosmétique à travers&nbsp;3&nbsp;mini-jeux
      sur les ingrédients, les produits et les formulations.
    </p>

    <!-- Liste rapide des 3 mini-jeux pour donner envie de jouer -->
    <ul class="home-minijeux" aria-label="Les 3 mini-jeux du jeu">
      <li>🌿 Ingrédients &amp; Produits</li>
      <li>🧴 Produit &amp; Contenant</li>
      <li>⚗️ Action &amp; Pôle</li>
    </ul>

    <!-- Bouton d'action principal : démarre le parcours vers /pseudo -->
    <!-- (click)="commencer()" appelle la méthode commencer() dans home.ts -->
    <button
      class="btn-primary"
      type="button"
      (click)="commencer()"
    >
      Commencer
    </button>

  </div>

</main>
