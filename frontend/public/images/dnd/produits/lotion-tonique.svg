<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 170" width="200" height="170">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Coton (rond moelleux) -->
  <circle cx="60" cy="100" r="28" fill="#fff" stroke="#c4b5fd" stroke-width="2.5"/>
  <circle cx="55" cy="90" r="8" fill="#fff" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
  <circle cx="70" cy="105" r="6" fill="#fff" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
  <circle cx="50" cy="110" r="5" fill="#fff" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
  <!-- Liquide qui coule du coton vers le bas -->
  <path d="M 60 128 Q 65 140, 70 155 L 50 155 Q 55 140, 60 128 Z"
        fill="url(#g)" stroke="#a855f7" stroke-width="1.5"/>
  <!-- Vagues fluides à droite (suggestion d'application) -->
  <path d="M 100 60 Q 130 65, 160 60" stroke="#a855f7" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M 105 80 Q 130 85, 155 80" stroke="#a855f7" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M 110 100 Q 130 105, 150 100" stroke="#a855f7" stroke-width="2.5" fill="none" opacity="0.7"/>
  <!-- Gouttelettes -->
  <ellipse cx="120" cy="125" rx="3" ry="5" fill="url(#g)" stroke="#a855f7" stroke-width="1.5"/>
  <ellipse cx="140" cy="130" rx="2.5" ry="4" fill="url(#g)" stroke="#a855f7" stroke-width="1.5"/>
  <ellipse cx="160" cy="140" rx="2" ry="3" fill="url(#g)" stroke="#a855f7" stroke-width="1.5"/>
</svg>