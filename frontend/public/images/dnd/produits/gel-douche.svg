  <circle cx="160" cy="135" r="9" fill="#fce7f3" stroke="#a855f7" stroke-width="2"/>
  <circle cx="100" cy="140" r="13" fill="#fce7f3" stroke="#a855f7" stroke-width="2"/>
  <!-- Reflets brillants sur les bulles -->
